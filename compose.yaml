services:
  postgres:
    image: postgres:17
    container_name: booking-postgres

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5433:5432"

    volumes:
      - booking_postgres_data:/var/lib/postgresql/data

volumes:
  booking_postgres_data: